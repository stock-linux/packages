on: push
name: 🚀 Deploy packages on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v2
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.3.2
      with:
        server: stocklinux.org
        username: u563069179
        password: ${{ secrets.ftp_password }}
        server-dir: public_html/dl/dev/
